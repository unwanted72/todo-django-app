<!DOCTYPE html>
<html>
<head>

<title>Todo App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Todo App</h2>

<a href="/logout" class="btn btn-danger mb-3">Logout</a>

<form method="POST">

{% csrf_token %}

<div class="input-group">

<input type="text" name="title" class="form-control" placeholder="Add task">

<input type="date" name="due_date" class="form-control">

<button class="btn btn-primary">Add</button>

</div>

</form>

<br>

<table class="table table-bordered">

<tr>
<th>Task</th>
<th>Status</th>
<th>Update</th>
<th>Delete</th>
</tr>

{% for task in tasks %}

<tr>

<td>{{task.title}}</td>

<td>

{% if task.completed %}
✔ Completed
{% else %}
Pending
{% endif %}

</td>

<td>
<a href="/update/{{task.id}}" class="btn btn-warning">Update</a>
</td>

<td>
<a href="/delete/{{task.id}}" class="btn btn-danger">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
